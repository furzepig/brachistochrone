---
layout: default
---
<header>
  <h1>{{ page.title }}</h1>
</header>
<div class="dg-meta">
  {% if page.location %}
  <p><strong>Location:</strong> {{ page.location.lat }}, {{ page.location.lon }}</p>
  {% endif %}
</div>
<div>
  {{ content }}
</div>
{% if page.images %}
<div class="stone-images">
  {% for image in page.images %}
  <img src="/images/stones/{{ page.image_folder }}/{{ image }}" alt="{{ page.title }}" style="width:100vw; display:block; margin-left:calc(-50vw + 50%);"/>
  {% endfor %}
</div>
{% endif %}
<footer>
{{ page.date | date: "%-d %B %Y"}}
</footer>
