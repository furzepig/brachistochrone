<!DOCTYPE html>

  }

  .map-btn {
    position: fixed; z-index: 10;
    padding: 6px 14px;
    font-family: 'Courier New', monospace; font-size: 0.7rem; letter-spacing: 0.1em;
    background: #1a1a2e; color: #f0ede8; border: none; cursor: pointer; border-radius: 2px;
    opacity: 0.85;
  }
  .map-btn:hover { background: #2e2e50; opacity: 1; }
  #toggle-btn { top: 62px; left: 12px; }
  #anim-btn   { top: 62px; left: 110px; }
  #specs-panel {
    position: fixed; z-index: 10;
    top: 94px; left: 12px;
    max-height: 10vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #1a1a2e;
    pointer-events: none;
  }
  #specs-panel .sp-title {
    font-size: clamp(8px, 1.8vh, 14px);
    font-family: Georgia, serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  #specs-panel .sp-line {
    font-size: clamp(6px, 1.2vh, 10px);
    letter-spacing: 0.05em;
    opacity: 0.75;
    line-height: 1.5;
  }
  svg { position: fixed; top: 50px; left: 0; width: 100vw; height: calc(100vh - 50px); display: block; touch-action: none; cursor: grab; background: #f0ede8; }
  svg:active { cursor: grabbing; }
  .label-main   { font-family: Georgia, serif; font-style: italic; font-size: 13px; fill: #1a1a2e; }
  .label-sub    { font-family: 'Courier New', monospace; font-size: 9.5px; fill: #444; }
  .label-hub    { font-family: Georgia, serif; font-style: italic; font-size: 15px; fill: #1a1a2e; }
  .label-small  { font-family: 'Courier New', monospace; font-size: 8.5px; fill: #555; }
  .arrow-label  { font-family: 'Courier New', monospace; font-size: 8px; fill: #888; letter-spacing: 0.1em; }
  .section-lbl  { font-family: 'Courier New', monospace; font-size: 11px; fill: #999; letter-spacing: 0.18em; }
</style>

<script>
function buildOverlays() {
  const layer = document.getElementById('id-overlay-layer');
  if (layer.childElementCount > 0) return;
  const svg = layer.closest('svg');
  const skipIds = new Set(['arrow','id-overlay-layer']);
  svg.querySelectorAll('[id]').forEach(el => {
    if (skipIds.has(el.id) || el.closest('defs')) return;
    let bbox; try { bbox = el.getBBox(); } catch(e) { return; }
    if (!bbox || (bbox.width === 0 && bbox.height === 0)) return;
    const lw = el.id.length * 5.2 + 4, lh = 10;
    const cx = bbox.x + bbox.width/2, cy = bbox.y + bbox.height/2;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.display = 'none'; g.dataset.overlay = '1';
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x', cx-lw/2); r.setAttribute('y', cy-lh/2);
    r.setAttribute('width', lw); r.setAttribute('height', lh); r.setAttribute('rx','2');
    r.setAttribute('fill','rgba(255,230,0,0.92)'); r.setAttribute('stroke','#aa8800'); r.setAttribute('stroke-width','0.5');
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', cx); t.setAttribute('y', cy+3.5); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','Courier New,monospace'); t.setAttribute('font-size','7'); t.setAttribute('fill','#000');
    t.textContent = el.id;
    g.appendChild(r); g.appendChild(t); layer.appendChild(g);
  });
}
// ── Flight Train Tether Sync ───────────────────────────────────────────────
// Engine nacelle: top edge y=836, bottom edge y=874, full tether half-length=380
// visible half-length = 380 * |sin(angleDeg)|
// Angle tracks the SVG animateTransform: 360deg per 5000ms, starting at 0
const FULL_LEN   = 110;   // tether half-length in flight train view
const ENGINE_TOP = 482;   // nacelle top edge (cx=1400, cy=490)
const ENGINE_BOT = 498;   // nacelle bottom edge
const FT_CX      = 1400;  // flight train centre x
const DUR_MS     = 5000;

let animRunning  = true;
let animStartTime = null;
let pausedAngle   = 0;  // angle (deg) at which we paused

// Ring radii matching the plan views (outer, ring2, ring3, inner)
const MAL_RINGS = [
  { id: 'ft-mal-outer',      r: 150 },
  { id: 'ft-mal-driftcity',  r: 110 },
  { id: 'ft-mal-zemlya',     r: 72  },
  { id: 'ft-mal-wilderness', r: 38  }
];
const COR_RINGS = [
  { id: 'ft-cor-outer',      r: 150 },
  { id: 'ft-cor-sanctuary',  r: 110 },
  { id: 'ft-cor-ringone',    r: 72  },
  { id: 'ft-cor-cargo',      r: 38  }
];

// Scale factor: ring radii in plan view (r=150) should map to a reasonable
// size in the flight train view relative to the tether (FULL_LEN=380).
// In the plan view, the disc outer radius is 150 viewBox units.
// We use the same units directly — the tether is 380 units long and the disc
// is 150 units wide, which is physically consistent (disc ~40% of tether).
const RING_SCALE = 0.25;

function updateTether(angleDeg) {
  const rad     = angleDeg * Math.PI / 180;
  const sinA    = Math.abs(Math.sin(rad));
  const cosA    = Math.cos(rad);          // signed — gives ellipse orientation
  const visible = FULL_LEN * sinA;

  // Tether lines
  const up   = document.getElementById('engine-tether-up');
  const down = document.getElementById('engine-tether-down');
  const malCY  = ENGINE_TOP - visible;   // Malabar centre y (upper tip)
  const corCY  = ENGINE_BOT + visible;   // Coromandel centre y (lower tip)
  up.setAttribute('y1',   malCY);
  up.setAttribute('y2',   ENGINE_TOP);
  down.setAttribute('y1', ENGINE_BOT);
  down.setAttribute('y2', corCY);

  // Habitat ring ellipses
  // rx = r * |cos(angle)| — the face-on width collapses as we tilt to side-on
  // ry = r — always shows full radius vertically in flight train view
  // At theta=90 (side-on): rx=0, rings appear as vertical lines
  // At theta=0  (face-on): rx=r, rings are circles
  const absCos = Math.abs(cosA);
  MAL_RINGS.forEach(ring => {
    const el = document.getElementById(ring.id);
    el.setAttribute('cx', FT_CX);
    el.setAttribute('cy', malCY);
    el.setAttribute('rx', ring.r * RING_SCALE);
    el.setAttribute('ry', ring.r * absCos * RING_SCALE);
  });
  COR_RINGS.forEach(ring => {
    const el = document.getElementById(ring.id);
    el.setAttribute('cx', FT_CX);
    el.setAttribute('cy', corCY);
    el.setAttribute('rx', ring.r * RING_SCALE);
    el.setAttribute('ry', ring.r * absCos * RING_SCALE);
  });
}

function flightTrainLoop(timestamp) {
  if (!animRunning) return;
  if (!animStartTime) animStartTime = timestamp - (pausedAngle / 360 * DUR_MS);
  const elapsed = (timestamp - animStartTime) % DUR_MS;
  const angle   = (elapsed / DUR_MS) * 360;
  updateTether(angle);
  requestAnimationFrame(flightTrainLoop);
}

requestAnimationFrame(flightTrainLoop);

// ── Animation toggle ───────────────────────────────────────────────────────
function toggleAnim() {
  const anim = document.getElementById('spin-anim');
  const btn  = document.getElementById('anim-btn');
  if (animRunning) {
    // Capture current angle before stopping
    const now = performance.now();
    if (animStartTime !== null) {
      const elapsed = (now - animStartTime) % DUR_MS;
      pausedAngle = (elapsed / DUR_MS) * 360;
    }
    animStartTime = null;
    anim.setAttribute('repeatCount', '0');
    anim.endElement();
    updateTether(pausedAngle);  // hold at current angle visually... 
    updateTether(0);            // ...then snap to 0 (fully vertical = fully visible)
    pausedAngle = 0;
    btn.textContent = 'START';
  } else {
    anim.setAttribute('repeatCount', 'indefinite');
    anim.beginElement();
    animStartTime = null;  // reset so loop recalculates from pausedAngle=0
    requestAnimationFrame(flightTrainLoop);
    btn.textContent = 'STOP';
  }
  animRunning = !animRunning;
}

function toggleIDs() {
  const btn = document.getElementById('toggle-btn');
  buildOverlays();
  const overlays = document.getElementById('id-overlay-layer').querySelectorAll('[data-overlay]');
  const show = overlays.length > 0 && overlays[0].style.display === 'none';
  overlays.forEach(g => g.style.display = show ? 'block' : 'none');
  btn.textContent = show ? 'HIDE ELEMENT IDs' : 'SHOW ELEMENT IDs';
}

// ── Zoom & Pan ──────────────────────────────────────────────────────────────
(function() {
  const svg = document.querySelector('svg');
  const BASE = { x: 0, y: 0, w: 1600, h: 980 };
  const MIN_ZOOM = 1, MAX_ZOOM = 8;
  let vb = { ...BASE };

  function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

  function applyVB() {
    svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  }

  // Convert a client-space point to viewBox-space
  function clientToVB(cx, cy) {
    const rect = svg.getBoundingClientRect();
    return {
      x: vb.x + (cx - rect.left) / rect.width  * vb.w,
      y: vb.y + (cy - rect.top)  / rect.height * vb.h
    };
  }

  // Zoom centred on a viewBox point
  function zoomAt(vbPt, factor) {
    const newW = clamp(vb.w * factor, BASE.w / MAX_ZOOM, BASE.w / MIN_ZOOM);
    const newH = clamp(vb.h * factor, BASE.h / MAX_ZOOM, BASE.h / MIN_ZOOM);
    const scale = newW / vb.w;
    vb.x = vbPt.x - (vbPt.x - vb.x) * scale;
    vb.y = vbPt.y - (vbPt.y - vb.y) * scale;
    vb.w = newW;
    vb.h = newH;
    applyVB();
  }

  // ── Mouse wheel zoom ──────────────────────────────────────────────────────
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.1 : 0.9;
    zoomAt(clientToVB(e.clientX, e.clientY), factor);
  }, { passive: false });

  // ── Mouse drag pan ────────────────────────────────────────────────────────
  let drag = null;
  svg.addEventListener('mousedown', e => {
    drag = { startVB: { ...vb }, startClient: { x: e.clientX, y: e.clientY } };
  });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    const rect = svg.getBoundingClientRect();
    const dx = (e.clientX - drag.startClient.x) / rect.width  * vb.w;
    const dy = (e.clientY - drag.startClient.y) / rect.height * vb.h;
    vb.x = drag.startVB.x - dx;
    vb.y = drag.startVB.y - dy;
    applyVB();
  });
  window.addEventListener('mouseup', () => { drag = null; });

  // ── Touch: pinch-to-zoom + single-finger pan ──────────────────────────────
  let lastTouches = null;

  function midpoint(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }
  function dist(t1, t2) {
    return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
  }

  svg.addEventListener('touchstart', e => {
    e.preventDefault();
    lastTouches = Array.from(e.touches);
  }, { passive: false });

  svg.addEventListener('touchmove', e => {
    e.preventDefault();
    const touches = Array.from(e.touches);

    if (touches.length === 2 && lastTouches.length === 2) {
      // Pinch zoom
      const oldDist = dist(lastTouches[0], lastTouches[1]);
      const newDist = dist(touches[0], touches[1]);
      const factor  = oldDist / newDist;
      const mid     = midpoint(touches[0], touches[1]);
      zoomAt(clientToVB(mid.x, mid.y), factor);
    } else if (touches.length === 1 && lastTouches.length === 1) {
      // Single-finger pan
      const rect = svg.getBoundingClientRect();
      const dx = (touches[0].clientX - lastTouches[0].clientX) / rect.width  * vb.w;
      const dy = (touches[0].clientY - lastTouches[0].clientY) / rect.height * vb.h;
      vb.x -= dx;
      vb.y -= dy;
      applyVB();
    }

    lastTouches = touches;
  }, { passive: false });

  svg.addEventListener('touchend', e => {
    lastTouches = Array.from(e.touches);
  }, { passive: false });

  // ── Double-tap / double-click to reset ───────────────────────────────────
  let lastTap = 0;
  svg.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) { vb = { ...BASE }; applyVB(); }
    lastTap = now;
  });
  svg.addEventListener('dblclick', () => { vb = { ...BASE }; applyVB(); });

})();
</script>
</body>
