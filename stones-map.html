---
layout: default
title: Stones Map
---
<style>
  .stones-map-wrap {
    width: 100vw;
    margin-left: calc(-50vw + 50%);
    background: #1a1f2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 0;
  }
  .stones-map-wrap h2 {
    color: #c8b89a;
    font-family: Georgia, serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  #uk-map {
    width: min(500px, 90vw);
    height: auto;
  }
  .uk-land {
    fill: #2d3548;
    stroke: #4a5568;
    stroke-width: 0.8;
  }
  .stone-marker {
    fill: #c8b89a;
    stroke: #1a1f2e;
    stroke-width: 1;
    cursor: pointer;
    transition: fill 0.2s, r 0.2s;
  }
  .stone-marker:hover {
    fill: #f0e0c0;
  }
  .stone-tooltip {
    position: fixed;
    background: #1a1f2e;
    color: #c8b89a;
    border: 1px solid #4a5568;
    padding: 0.4rem 0.8rem;
    font-family: Georgia, serif;
    font-size: 0.8rem;
    pointer-events: none;
    display: none;
    z-index: 100;
  }
</style>

<script>
// Stones data from Jekyll - injected at build time
var stones = [
  {% for post in site.categories.stones %}
  {% if post.location %}
  {
    name: {{ post.title | jsonify }},
    lat: {{ post.location.lat }},
    lon: {{ post.location.lon }},
    url: "{{ post.url }}"
  }{% unless forloop.last %},{% endunless %}
  {% endif %}
  {% endfor %}
];

// Project lat/lon to SVG coordinates
// Bounding box: lat 49.9-58.7, lon -8.65 to 1.76, viewBox 0 0 500 700
function project(lat, lon) {
  var latMin = 49.9, latMax = 58.7;
  var lonMin = -8.65, lonMax = 1.76;
  var svgW = 480, svgH = 680;
  var x = (lon - lonMin) / (lonMax - lonMin) * svgW + 10;
  var y = (latMax - lat) / (latMax - latMin) * svgH + 10;
  return { x: x, y: y };
}

var svg = document.getElementById('stone-markers');
var tooltip = document.getElementById('tooltip');

stones.forEach(function(stone) {
  var pt = project(stone.lat, stone.lon);
  var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', pt.x);
  circle.setAttribute('cy', pt.y);
  circle.setAttribute('r', '6');
  circle.setAttribute('class', 'stone-marker');
  circle.addEventListener('mousemove', function(e) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
    tooltip.textContent = stone.name;
  });
  circle.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
  });
  circle.addEventListener('click', function() {
    window.location.href = stone.url;
  });
  svg.appendChild(circle);
});
</script>
